name: CI-CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  ci:
    name: Test App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx jest
  deploy:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - name: Deploy using SSH (server pull method)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            echo "Cleaning web directory..."
            rm -rf /home/kachi.vudse26.cloud/public_html/*

            echo "Pulling latest code from GitHub..."
            cd /home/kachi.vudse26.cloud/public_html

            git init
            git remote add origin https://github.com/OkekeKachi/ci-cd-pipeline-calculator.git
            git pull origin main